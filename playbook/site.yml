---
- name: Install Clickhouse
  hosts: clickhouse
  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
  tasks:
    - name: Ping for testing
      ansible.builtin.ping:

    - block:
        - name: Get clickhouse distrib common-static from primary URL
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/stable/main/clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            dest: "./clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            mode: '0644'
        - name: Get clickhouse-client distrib from primary URL
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/stable/main/clickhouse-client_{{ clickhouse_version }}_amd64.deb"
            dest: "./clickhouse-client_{{ clickhouse_version }}_amd64.deb"
            mode: '0644'
        - name: Get clickhouse-server distrib from primary URL
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/stable/main/clickhouse-server_{{ clickhouse_version }}_amd64.deb"
            dest: "./clickhouse-server_{{ clickhouse_version }}_amd64.deb"
            mode: '0644'
      rescue:
        - name: Get clickhouse distrib common-static from secondary URL
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/stable/main/clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            dest: "./clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            mode: '0644'
    - name: Install clickhouse packages
      become: true
      ansible.builtin.apt:
        deb:
          - "./clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
          - "./clickhouse-client_{{ clickhouse_version }}_amd64.deb"
          - "./clickhouse-server_{{ clickhouse_version }}_amd64.deb"
      notify: Start clickhouse service
    - name: Flush handlers
      ansible.builtin.meta: flush_handlers
    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install and configure Vector
  hosts: clickhouse  # Убедитесь, что этот хост определен в вашем inventory
  tasks:
    - name: Download Vector
      ansible.builtin.get_url:
        url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-x86_64.deb"
        dest: "/tmp/vector-{{ vector_version }}-x86_64.deb"
        mode: '0644'

    - name: Install Vector
      become: true
      ansible.builtin.apt:
        deb: "/tmp/vector-{{ vector_version }}-x86_64.deb"

    - name: Configure Vector
      become: true
      ansible.builtin.template:
        src: "templates/vector.toml.j2"
        dest: "/etc/vector/vector.toml"
        mode: '0644'

    - name: Start Vector service
      become: true
      ansible.builtin.service:
        name: vector
        state: started
        enabled: true
      changed_when: false
